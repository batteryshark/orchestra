<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>orchestra</title>
<style>
:root { color-scheme: light dark;
  --bg:#f6f7f9; --card:#fff; --ink:#1a202c; --muted:#64748b; --line:#e2e8f0;
  --blue:#2563eb; --green:#16a34a; --red:#dc2626; --amber:#d97706; --gray:#6b7280;
  --think:#8b5cf6; --tool:#0891b2; --sel:#eff6ff; }
@media (prefers-color-scheme: dark) { :root {
  --bg:#0f1115; --card:#181b21; --ink:#e5e9f0; --muted:#8b95a5; --line:#2a2f3a; --sel:#1e2a44; } }
* { box-sizing:border-box }
body { margin:0; font:14px/1.5 ui-sans-serif,system-ui,-apple-system,sans-serif;
  background:var(--bg); color:var(--ink); }
header { display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  padding:12px 20px; border-bottom:1px solid var(--line); }
header .brand { display:inline-flex; align-items:center; gap:10px;
  color:inherit; text-decoration:none; font-size:13px; font-weight:620; }
.brand-mark { display:inline-flex; align-items:flex-end; gap:2px;
  width:18px; height:18px; }
.brand-mark span { width:4px; border-radius:4px; background:var(--ink); }
.brand-mark span:nth-child(1) { height:9px; opacity:.45; }
.brand-mark span:nth-child(2) { height:16px; }
.brand-mark span:nth-child(3) { height:12px; opacity:.7; }
header h1 { margin:0; font-size:inherit; font-weight:inherit; letter-spacing:inherit }
header .root { color:var(--muted); font-family:ui-monospace,monospace; font-size:12px }
header nav { margin-left:auto; display:flex; gap:12px; align-items:center }
.proj-sel { position:relative; display:inline-flex }
.proj-btn { display:inline-flex; align-items:center; gap:7px;
  font:inherit; font-size:13px; padding:4px 10px; color:var(--ink);
  background:var(--card); border:1px solid var(--line); border-radius:8px; cursor:pointer;
  max-width:280px }
.proj-btn:hover { background:var(--sel) }
.proj-btn[aria-expanded="true"] { background:var(--sel); box-shadow:inset 0 0 0 1px var(--blue) }
.proj-dot { width:8px; height:8px; border-radius:50%; background:var(--green); flex:0 0 auto }
.proj-label { overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
.proj-caret { color:var(--muted); font-size:10px }
.proj-menu { position:absolute; top:calc(100% + 4px); left:0; min-width:280px; max-width:380px;
  background:var(--card); border:1px solid var(--line); border-radius:10px; padding:6px;
  box-shadow:0 8px 24px rgba(0,0,0,.14); z-index:50; max-height:60vh; overflow-y:auto }
.proj-opt { display:block; width:100%; text-align:left; padding:7px 10px; border-radius:7px;
  cursor:pointer; background:none; color:var(--ink); border:none; font:inherit; font-size:13px }
.proj-opt:hover { background:var(--sel) }
.proj-opt[aria-selected="true"] { background:var(--sel); box-shadow:inset 3px 0 0 var(--blue) }
.proj-opt .po-name { display:block; font-weight:600 }
.proj-opt .po-root { display:block; color:var(--muted); font-family:ui-monospace,monospace;
  font-size:11px; margin-top:2px; word-break:break-all }
.proj-opt.offline .po-name { color:var(--muted) }
main { padding:14px 20px; max-width:1500px; margin:0 auto; display:flex; flex-direction:column; gap:14px }
.cols { display:grid; grid-template-columns:330px 1fr; gap:14px; min-height:0 }
@media (max-width:980px){ .cols { grid-template-columns:1fr } }
.card { background:var(--card); border:1px solid var(--line); border-radius:10px; overflow:hidden }
.card h2 { font-size:12px; text-transform:uppercase; letter-spacing:.06em;
  color:var(--muted); margin:0; padding:10px 14px; border-bottom:1px solid var(--line) }
.chip { display:inline-block; padding:0 8px; border-radius:99px; font-size:11px;
  font-weight:600; color:#fff }
.s-running { background:var(--blue); animation:pulse 1.6s infinite }
.s-spawning { background:var(--amber) }
.s-waiting_input { background:var(--amber); animation:pulse 1.6s infinite }
.s-done { background:var(--green) } .s-failed,.s-timeout { background:var(--red) }
.s-killed { background:var(--gray) }
@keyframes pulse { 50% { opacity:.55 } }
.muted { color:var(--muted) } .mono { font-family:ui-monospace,monospace; font-size:12px }

/* runs sidebar */
#runlist { max-height:72vh; overflow-y:auto }
.runitem { padding:9px 14px; border-bottom:1px solid var(--line); cursor:pointer }
.runitem:hover { background:var(--sel) }
.runitem.sel { background:var(--sel); box-shadow:inset 3px 0 0 var(--blue) }
.runitem.child { border-left:2px solid color-mix(in srgb, var(--blue) 35%, var(--line)) }
.runitem.continuation { border-left:2px solid color-mix(in srgb, var(--green) 45%, var(--line)) }
.runitem .top { display:flex; gap:8px; align-items:center }
.runitem .title { font-size:12px; color:var(--muted); margin-top:2px;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
.lineage-link { color:var(--blue); background:none; border:0; padding:0; cursor:pointer;
  font:inherit; text-decoration:underline; text-decoration-color:color-mix(in srgb, var(--blue) 35%, transparent) }

/* transcript panel */
#panel { display:flex; flex-direction:column; min-height:0 }
#phead { display:flex; gap:10px; align-items:center; flex-wrap:wrap;
  padding:10px 14px; border-bottom:1px solid var(--line); font-size:13px }
#pbody { overflow-y:auto; height:72vh; padding:12px 16px; scroll-behavior:auto }
.titem { margin:0 0 10px }
.titem .prose { white-space:pre-wrap; overflow-wrap:anywhere }
.titem.meta { color:var(--muted); font-size:12px }
.titem.error { color:var(--red); white-space:pre-wrap; font-size:13px;
  border-left:3px solid var(--red); padding-left:10px }
.titem.delivery { border:1px solid var(--line); border-left:4px solid var(--blue);
  border-radius:8px; margin:10px 0; padding:9px 11px; background:color-mix(in srgb, var(--blue) 5%, transparent) }
.titem.delivery.interrupt { border-left-color:var(--red);
  background:color-mix(in srgb, var(--red) 6%, transparent) }
.titem.delivery.checkin { border-left-color:var(--think) }
.titem.delivery.pending { border-left-color:var(--amber); border-style:dashed }
.titem.delivery.recalled { border-left-color:var(--muted); opacity:.72 }
.titem.delivery .event-title { font-size:12px; font-weight:700; letter-spacing:.035em;
  text-transform:uppercase }
.titem.delivery .event-route { color:var(--muted); font-size:11.5px; margin-left:7px }
.titem.delivery .event-body { margin-top:6px; white-space:pre-wrap; overflow-wrap:anywhere }
.titem.question { border:1px solid color-mix(in srgb, var(--amber) 50%, var(--line));
  border-left:4px solid var(--amber); border-radius:8px; margin:10px 0; padding:10px 12px;
  background:color-mix(in srgb, var(--amber) 7%, transparent) }
.titem.question.resolved { border-left-color:var(--green);
  background:color-mix(in srgb, var(--green) 6%, transparent) }
.titem.question .question-title { font-size:12px; font-weight:700; text-transform:uppercase;
  letter-spacing:.035em }
.titem.question .event-route { color:var(--muted); font-size:11.5px; margin-left:7px }
.titem.question .question-body { margin-top:7px; white-space:pre-wrap; overflow-wrap:anywhere }
.titem.question .question-default,.titem.question .question-answer { margin-top:7px;
  padding-left:10px; border-left:2px solid var(--line); white-space:pre-wrap; overflow-wrap:anywhere }
.titem.question .question-action { margin-top:8px; color:var(--muted); font-size:11.5px }
details { border:1px solid var(--line); border-radius:8px; margin:6px 0 }
details summary { cursor:pointer; padding:5px 10px; font-size:12.5px; user-select:none;
  display:flex; gap:8px; align-items:center }
details[open] summary { border-bottom:1px solid var(--line) }
details .inner { padding:8px 10px; max-height:420px; overflow:auto }
details pre { margin:4px 0; white-space:pre-wrap; overflow-wrap:anywhere;
  font-size:12px; font-family:ui-monospace,monospace }
details.think summary { color:var(--think) }
details.tool summary { color:var(--tool) }
details.prompt { border-color:color-mix(in srgb, var(--blue) 35%, var(--line)) }
details.prompt summary { color:var(--blue) }
details .lbl { font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted) }
table.kv { border-collapse:collapse; font-size:12.5px }
table.kv th { text-align:left; color:var(--muted); font-weight:600;
  padding:2px 12px 2px 0; text-transform:lowercase; letter-spacing:.02em }
table.kv td { padding:2px 0; font-family:ui-monospace,monospace }
#follow { margin-left:auto; display:flex; gap:6px; align-items:center; font-size:12px; color:var(--muted) }
button { font:inherit; font-size:12px; border:1px solid var(--line); background:none;
  color:var(--blue); border-radius:6px; padding:2px 10px; cursor:pointer }
button.danger { color:var(--red); border-color:color-mix(in srgb, var(--red) 35%, var(--line)) }
button:disabled { color:var(--muted); cursor:not-allowed; opacity:.7 }

/* bottom row */
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:14px }
@media (max-width:980px){ .row2 { grid-template-columns:1fr } }
.scrollbox { max-height:46vh; overflow-y:auto; padding:6px 14px 10px }
.msg { border-left:3px solid var(--line); padding:6px 10px; margin:8px 0 }
.msg.unread { border-left-color:var(--blue) }
.msg .meta { font-size:12px; color:var(--muted) }
.msg .body { white-space:pre-wrap; overflow-wrap:anywhere; margin-top:2px }
.feeditem { padding:5px 0; border-bottom:1px solid var(--line); overflow-wrap:anywhere }
.feeditem:last-child { border-bottom:none }
#beat { width:8px; height:8px; border-radius:50%; background:var(--green);
  display:inline-block; margin-left:6px }

/* provider runway dock */
.runway-dock { position:fixed; inset:0 0 0 auto; z-index:80; pointer-events:none }
.runway-rail { position:absolute; top:74px; right:10px; width:62px; max-height:calc(100vh - 88px);
  display:flex; flex-direction:column; gap:7px; padding:7px; overflow-y:auto; pointer-events:auto;
  background:color-mix(in srgb, var(--card) 94%, transparent); border:1px solid var(--line);
  border-radius:12px; box-shadow:0 10px 28px rgba(0,0,0,.16); backdrop-filter:blur(14px) }
.runway-toggle { display:flex; align-items:center; justify-content:center; width:46px; min-height:36px;
  padding:5px; color:var(--ink); background:var(--card); border-radius:8px }
.runway-toggle:hover { background:var(--sel) }
.runway-toggle.active { color:var(--blue); background:var(--sel);
  box-shadow:inset 0 0 0 1px color-mix(in srgb, var(--blue) 45%, var(--line)) }
.runway-toggle svg { width:17px; height:17px; fill:none; stroke:currentColor; stroke-width:1.8 }
.runway-rail-provider { display:flex; flex-direction:column; align-items:center; gap:2px; width:46px;
  min-height:48px; padding:5px 2px; color:var(--ink); border:0; border-radius:8px; background:transparent }
.runway-rail-provider:hover { background:var(--sel) }
.runway-monogram { display:grid; place-items:center; width:24px; height:24px; border-radius:7px;
  color:var(--muted); background:color-mix(in srgb, var(--muted) 11%, transparent);
  font-size:9px; font-weight:750; letter-spacing:.02em }
.runway-rail-value { font-size:10px; font-weight:700; line-height:1.1 }
.runway-rail-provider.healthy .runway-rail-value { color:var(--green) }
.runway-rail-provider.watch .runway-rail-value { color:var(--amber) }
.runway-rail-provider.critical .runway-rail-value { color:var(--red) }
.runway-rail-provider.unavailable { opacity:.55 }
.runway-backdrop { position:fixed; inset:0; pointer-events:auto; background:rgba(5,8,12,.24);
  opacity:0; transition:opacity .18s; backdrop-filter:blur(1px) }
.runway-drawer { position:fixed; inset:0 0 0 auto; width:min(390px, calc(100vw - 32px));
  display:flex; flex-direction:column; pointer-events:auto; background:var(--bg);
  border-left:1px solid var(--line); box-shadow:-18px 0 48px rgba(0,0,0,.2);
  transform:translateX(102%); transition:transform .22s ease }
.runway-dock.open .runway-backdrop { opacity:1 }
.runway-dock.open .runway-drawer { transform:translateX(0) }
.runway-drawer-head { display:flex; align-items:flex-start; gap:10px; padding:17px 16px 13px;
  border-bottom:1px solid var(--line) }
.runway-drawer-head h2 { margin:0; font-size:15px; letter-spacing:-.01em }
.runway-drawer-head p { margin:2px 0 0; color:var(--muted); font-size:11px }
.runway-drawer-actions { display:flex; gap:6px; margin-left:auto }
.runway-icon-button { display:grid; place-items:center; width:30px; height:30px; padding:0;
  color:var(--muted); background:var(--card) }
.runway-icon-button:hover { color:var(--ink); background:var(--sel) }
.runway-icon-button svg { width:15px; height:15px; fill:none; stroke:currentColor; stroke-width:1.8;
  stroke-linecap:round; stroke-linejoin:round }
.runway-icon-button.loading svg { animation:runway-spin .8s linear infinite }
@keyframes runway-spin { to { transform:rotate(360deg) } }
.runway-summary { display:flex; align-items:center; gap:9px; padding:10px 16px;
  color:var(--muted); border-bottom:1px solid var(--line); font-size:11px }
.runway-live-dot { width:7px; height:7px; flex:0 0 auto; border-radius:50%; background:var(--amber) }
.runway-summary.online .runway-live-dot { background:var(--green) }
.runway-summary.offline .runway-live-dot { background:var(--red) }
.runway-updated { margin-left:auto }
.runway-providers { flex:1; min-height:0; overflow-y:auto; padding:10px }
.runway-provider { margin-bottom:8px; overflow:hidden; background:var(--card);
  border:1px solid var(--line); border-radius:10px }
.runway-provider summary { min-height:58px; padding:9px 10px; border:0 }
.runway-provider[open] summary { border-bottom:1px solid var(--line) }
.runway-provider-title { min-width:0; flex:1 }
.runway-provider-title strong,.runway-provider-title span { display:block; overflow:hidden;
  text-overflow:ellipsis; white-space:nowrap }
.runway-provider-title span { color:var(--muted); font-size:10px }
.runway-headroom { font-size:15px; font-weight:720 }
.runway-headroom.healthy { color:var(--green) }
.runway-headroom.watch { color:var(--amber) }
.runway-headroom.critical { color:var(--red) }
.runway-provider-body { padding:9px 10px 10px }
.runway-quota { margin:7px 0 11px }
.runway-quota-head { display:flex; justify-content:space-between; gap:8px; font-size:11px }
.runway-quota-head span:first-child { overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
.runway-track { height:5px; margin-top:5px; overflow:hidden; border-radius:99px;
  background:color-mix(in srgb, var(--muted) 15%, transparent) }
.runway-fill { height:100%; border-radius:inherit; background:var(--green) }
.runway-quota.watch .runway-fill { background:var(--amber) }
.runway-quota.critical .runway-fill { background:var(--red) }
.runway-quota-meta,.runway-provider-message { margin-top:4px; color:var(--muted); font-size:10px }
.runway-credits { margin:2px 0 10px; padding:7px 8px; color:var(--muted);
  background:color-mix(in srgb, var(--blue) 5%, transparent); border:1px solid var(--line);
  border-radius:7px; font-size:10px }
.runway-credits strong { color:var(--ink) }
.runway-empty { padding:5px 0; color:var(--muted); font-size:11px }
.runway-error { padding:20px 12px; color:var(--muted); text-align:center; font-size:12px }
.runway-view { flex:1; min-height:0; display:flex; flex-direction:column }
.runway-view[hidden] { display:none }
.runtime-stats { flex:1; min-height:0; overflow-y:auto; padding:12px }
.runtime-hero { padding:14px; margin-bottom:10px; background:var(--card); border:1px solid var(--line);
  border-radius:10px }
.runtime-total { font-size:30px; font-weight:760; line-height:1.05; letter-spacing:-.035em }
.runtime-caption { margin-top:5px; color:var(--muted); font-size:11px }
.runtime-facts { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; margin-bottom:15px }
.runtime-fact { padding:9px; text-align:center; background:var(--card); border:1px solid var(--line);
  border-radius:9px }
.runtime-fact strong,.runtime-fact span { display:block }
.runtime-fact strong { font-size:16px }
.runtime-fact span { color:var(--muted); font-size:10px }
.runtime-section { margin-top:14px }
.runtime-section h3 { margin:0 0 7px; color:var(--muted); font-size:10px; font-weight:700;
  letter-spacing:.065em; text-transform:uppercase }
.runtime-row { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:10px; padding:9px 10px;
  margin-bottom:6px; background:var(--card); border:1px solid var(--line); border-radius:9px }
.runtime-row-title,.runtime-row-meta { overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
.runtime-row-title { font-weight:650 }
.runtime-row-meta { color:var(--muted); font-size:10px }
.runtime-row-value { align-self:center; font-family:ui-monospace,monospace; font-weight:700 }
.runtime-empty { padding:24px 12px; color:var(--muted); text-align:center }
@media (min-width:1200px) {
  body { padding-right:80px }
  .runway-backdrop { display:none }
}
@media (max-width:1199px) {
  .runway-rail { top:auto; right:14px; bottom:14px; width:auto; padding:0; overflow:visible;
    border:0; border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,.22) }
  .runway-rail-provider { display:none }
  .runway-toggle { width:auto; min-width:48px; padding:7px 10px; gap:7px }
  #runwayToggle::after { content:"Usage"; font-size:12px; font-weight:650 }
  #runtimeToggle::after { content:"Runtime"; font-size:12px; font-weight:650 }
}
@media (max-width:520px) {
  .runway-drawer { inset:0; width:auto }
}
</style></head><body>
 <header><a class="brand" href="/" aria-label="orchestra">
   <span class="brand-mark" aria-hidden="true"><span></span><span></span><span></span></span>
   <h1>orchestra<span id="beat"></span></h1>
</a><span class="root" id="root" hidden></span>
<div class="proj-sel" id="projSel" hidden>
  <button class="proj-btn" id="projBtn" type="button" aria-haspopup="listbox" aria-expanded="false">
    <span class="proj-dot" id="projDot" aria-hidden="true"></span>
    <span class="proj-label" id="projLabel">project</span>
    <span class="proj-caret" aria-hidden="true">▾</span>
  </button>
  <div class="proj-menu" id="projMenu" role="listbox" aria-label="Orchestra projects" hidden></div>
</div>
<nav></nav></header>
<main>
<div class="cols">
  <div style="display:flex;flex-direction:column;gap:14px;min-width:0">
    <div class="card"><h2>Runs</h2><div id="runlist"></div></div>
    <div class="card" id="enscard" style="display:none"><h2>Ensemble teams</h2><div id="ensteams"></div></div>
  </div>
  <div class="card" id="panel">
    <div id="phead"><span class="muted">select a run</span></div>
    <div id="pbody"></div>
  </div>
</div>
<div class="row2">
  <div class="card"><h2>Inboxes</h2><div class="scrollbox" id="inboxes"></div></div>
  <div class="card"><h2>Findings feed</h2><div class="scrollbox" id="feed"></div>
    <h2>Teams</h2><div class="scrollbox" id="teams" style="max-height:12vh"></div></div>
</div>
</main>
<aside class="runway-dock" id="runwayDock" aria-label="Orchestra insights">
  <div class="runway-backdrop" id="runwayBackdrop" hidden></div>
  <div class="runway-rail" id="runwayRail">
    <button class="runway-toggle" id="runwayToggle" type="button" aria-label="Open provider runway" aria-controls="runwayDrawer" aria-expanded="false">
      <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M3 15.5V11m5.5 4.5v-11m5.5 11V8"/></svg>
    </button>
    <button class="runway-toggle" id="runtimeToggle" type="button" aria-label="Open runtime statistics" aria-controls="runwayDrawer" aria-expanded="false">
      <svg viewBox="0 0 20 20" aria-hidden="true"><circle cx="10" cy="10" r="7"/><path d="M10 6v4l3 2"/></svg>
    </button>
  </div>
  <section class="runway-drawer" id="runwayDrawer" aria-labelledby="runwayTitle" aria-hidden="true" inert>
    <div class="runway-drawer-head">
      <div><h2 id="runwayTitle">Provider runway</h2><p id="runwaySubtitle">Live coding-plan headroom</p></div>
      <div class="runway-drawer-actions">
        <button class="runway-icon-button" id="runwayRefresh" type="button" aria-label="Refresh provider usage">
          <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M15.8 6.2A7 7 0 1 0 17 10M15.8 6.2V2.8m0 3.4h-3.4"/></svg>
        </button>
        <button class="runway-icon-button" id="runwayClose" type="button" aria-label="Close provider runway">
          <svg viewBox="0 0 20 20" aria-hidden="true"><path d="m5 5 10 10M15 5 5 15"/></svg>
        </button>
      </div>
    </div>
    <div class="runway-view" id="usageView">
      <div class="runway-summary" id="runwaySummary"><span class="runway-live-dot"></span><span id="runwaySignal">Connecting</span><span class="runway-updated" id="runwayUpdated"></span></div>
      <div class="runway-providers" id="runwayProviders" aria-live="polite"><div class="runway-error">Checking providers…</div></div>
    </div>
    <div class="runway-view" id="runtimeView" hidden>
      <div class="runway-summary online"><span class="runway-live-dot"></span><span>Combined worker time</span><span class="runway-updated" id="runtimeUpdated"></span></div>
      <div class="runtime-stats" id="runtimeStats" aria-live="polite"><div class="runway-error">Calculating runtime…</div></div>
    </div>
  </section>
</aside>
<script>
const esc = s => (s??'').toString().replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let state = null, selected = null, selTm = null, userPicked = false, tEtag = null;
let lastHash = {};   // section -> serialized data, to skip re-render (keeps scroll)
const TERMINAL = new Set(['done','failed','timeout','killed']);
const stopping = new Set();

// --- provider runway (global control-plane signal) ----------------------
// Usage is account-wide rather than project-specific, so this request does
// not carry the selected-project header. The compact rail remains visible
// while the drawer is closed; opening a provider reveals its quota windows.
const runwayDock = document.getElementById('runwayDock');
const runwayRail = document.getElementById('runwayRail');
const runwayDrawer = document.getElementById('runwayDrawer');
const runwayToggle = document.getElementById('runwayToggle');
const runtimeToggle = document.getElementById('runtimeToggle');
const runwayBackdrop = document.getElementById('runwayBackdrop');
const runwayProviders = document.getElementById('runwayProviders');
const runwaySummary = document.getElementById('runwaySummary');
const runwaySignal = document.getElementById('runwaySignal');
const runwayUpdated = document.getElementById('runwayUpdated');
const runwayRefresh = document.getElementById('runwayRefresh');
const runwayClose = document.getElementById('runwayClose');
const usageView = document.getElementById('usageView');
const runtimeView = document.getElementById('runtimeView');
const runtimeStats = document.getElementById('runtimeStats');
const runtimeUpdated = document.getElementById('runtimeUpdated');
const RUNWAY_OPEN_KEY = 'orchestra.runway.open';
const INSIGHTS_VIEW_KEY = 'orchestra.insights.view';
const RUNWAY_MONOGRAMS = {minimax:'MM', kimi:'K', claude:'CL', zai:'Z', codex:'CX'};
let runwayLoading = false, runtimeLoading = false, insightsView = 'usage';

function runwayTone(value){
  if (value == null || !Number.isFinite(Number(value))) return 'unavailable';
  if (Number(value) <= 15) return 'critical';
  if (Number(value) <= 35) return 'watch';
  return 'healthy';
}
function runwayPercent(value){
  const n = Number(value);
  if (!Number.isFinite(n)) return '—';
  return `${Number.isInteger(n) ? n : n.toFixed(1)}%`;
}
function runwayReset(value){
  const target = new Date(value).getTime();
  if (!Number.isFinite(target)) return 'reset unknown';
  let minutes = Math.max(0, Math.floor((target - Date.now()) / 60000));
  const days = Math.floor(minutes / 1440); minutes %= 1440;
  const hours = Math.floor(minutes / 60); minutes %= 60;
  if (days) return `resets in ${days}d ${hours}h`;
  if (hours) return `resets in ${hours}h ${minutes}m`;
  return minutes ? `resets in ${minutes}m` : 'resetting now';
}
function insightsSetView(view, {remember=true}={}){
  insightsView = view === 'runtime' ? 'runtime' : 'usage';
  const runtime = insightsView === 'runtime';
  usageView.hidden = runtime;
  runtimeView.hidden = !runtime;
  runwayToggle.classList.toggle('active', !runtime);
  runtimeToggle.classList.toggle('active', runtime);
  document.getElementById('runwayTitle').textContent = runtime ? 'Runtime statistics' : 'Provider runway';
  document.getElementById('runwaySubtitle').textContent = runtime
    ? 'Combined execution time across every run' : 'Live coding-plan headroom';
  runwayClose.setAttribute('aria-label', runtime ? 'Close runtime statistics' : 'Close provider runway');
  runwayRefresh.setAttribute('aria-label', runtime ? 'Refresh runtime statistics' : 'Refresh provider usage');
  if (remember) {
    try { localStorage.setItem(INSIGHTS_VIEW_KEY, insightsView); } catch(e){}
  }
  if (runtime) refreshRuntimeStats();
}
function runwaySetOpen(open, {remember=true, view=null}={}){
  if (view) insightsSetView(view, {remember});
  runwayDock.classList.toggle('open', open);
  runwayToggle.setAttribute('aria-expanded', open && insightsView === 'usage' ? 'true' : 'false');
  runtimeToggle.setAttribute('aria-expanded', open && insightsView === 'runtime' ? 'true' : 'false');
  runwayToggle.setAttribute('aria-label', open && insightsView === 'usage' ? 'Close provider runway' : 'Open provider runway');
  runtimeToggle.setAttribute('aria-label', open && insightsView === 'runtime' ? 'Close runtime statistics' : 'Open runtime statistics');
  runwayDrawer.setAttribute('aria-hidden', open ? 'false' : 'true');
  runwayDrawer.toggleAttribute('inert', !open);
  runwayBackdrop.hidden = !open;
  if (remember) {
    try { localStorage.setItem(RUNWAY_OPEN_KEY, open ? '1' : '0'); } catch(e){}
  }
}
function runwayOpenProvider(id){
  runwaySetOpen(true, {view:'usage'});
  requestAnimationFrame(() => {
    const card = runwayProviders.querySelector(`[data-runway-provider="${CSS.escape(id)}"]`);
    if (!card) return;
    card.open = true;
    card.scrollIntoView({block:'nearest'});
  });
}
function runwayWindowHtml(quota){
  const remaining = Number(quota.remaining_percent);
  const bounded = Number.isFinite(remaining) ? Math.max(0, Math.min(100, remaining)) : 0;
  const tone = runwayTone(remaining);
  const burn = Number.isFinite(Number(quota.burn_rate_percent_per_hour))
    ? ` · −${runwayPercent(quota.burn_rate_percent_per_hour)}/hr` : '';
  return `<div class="runway-quota ${tone}">
    <div class="runway-quota-head"><span><b>${esc(quota.label)}</b> · ${esc(quota.scope)}</span><b>${esc(runwayPercent(remaining))}</b></div>
    <div class="runway-track" role="progressbar" aria-label="${esc(quota.label)} remaining" aria-valuemin="0" aria-valuemax="100" aria-valuenow="${bounded}"><div class="runway-fill" style="width:${bounded}%"></div></div>
    <div class="runway-quota-meta">${esc(quota.resets_at ? runwayReset(quota.resets_at) : 'reset unknown')}${esc(burn)}</div>
  </div>`;
}
function runwayCreditsHtml(credits){
  if (!credits) return '';
  const count = Number(credits.available_count);
  if (!Number.isInteger(count) || count < 0) return '';
  const label = count === 1 ? 'reset credit' : 'reset credits';
  const expiry = credits.expires_at ? ` · ${runwayReset(credits.expires_at).replace('resets', 'expires')}` : '';
  return `<div class="runway-credits"><strong>${esc(count)} ${label}</strong> available${esc(expiry)}</div>`;
}
function runwayProviderHtml(provider, wasOpen){
  const windows = Array.isArray(provider.windows) ? provider.windows : [];
  const tone = runwayTone(provider.headroom_percent);
  const status = provider.status === 'ok' ? 'live' : provider.status === 'stale' ? 'cached' : provider.status === 'auth_required' ? 'login needed' : provider.status === 'not_configured' ? 'setup needed' : 'offline';
  const body = windows.length ? windows.map(runwayWindowHtml).join('') :
    `<div class="runway-empty">${esc(provider.message || 'No usage snapshot is available.')}</div>`;
  return `<details class="runway-provider" data-runway-provider="${esc(provider.id)}" ${wasOpen ? 'open' : ''}>
    <summary><span class="runway-monogram" aria-hidden="true">${esc(RUNWAY_MONOGRAMS[provider.id] || provider.name.slice(0,2))}</span>
      <span class="runway-provider-title"><strong>${esc(provider.name)}</strong><span>${esc(provider.plan || 'Coding plan')} · ${esc(status)}</span></span>
      <span class="runway-headroom ${tone}">${esc(runwayPercent(provider.headroom_percent))}</span></summary>
    <div class="runway-provider-body">${runwayCreditsHtml(provider.rate_limit_resets)}${body}${provider.source ? `<div class="runway-provider-message">via ${esc(provider.source)}</div>` : ''}</div>
  </details>`;
}
function renderRunway(data){
  const providers = Array.isArray(data.providers) ? data.providers : [];
  const openProviders = new Set([...runwayProviders.querySelectorAll('details[open]')].map(el => el.dataset.runwayProvider));
  runwayProviders.innerHTML = providers.map(provider => runwayProviderHtml(provider, openProviders.has(provider.id))).join('') ||
    '<div class="runway-error">No providers are configured.</div>';
  runwayRail.querySelectorAll('.runway-rail-provider').forEach(el => el.remove());
  providers.forEach(provider => {
    const tone = runwayTone(provider.headroom_percent);
    const button = document.createElement('button');
    button.className = `runway-rail-provider ${tone}`;
    button.type = 'button';
    button.title = `${provider.name}: ${runwayPercent(provider.headroom_percent)} headroom`;
    button.setAttribute('aria-label', button.title);
    button.innerHTML = `<span class="runway-monogram" aria-hidden="true">${esc(RUNWAY_MONOGRAMS[provider.id] || provider.name.slice(0,2))}</span><span class="runway-rail-value">${esc(runwayPercent(provider.headroom_percent))}</span>`;
    button.addEventListener('click', () => runwayOpenProvider(provider.id));
    runwayRail.appendChild(button);
  });
  const generated = new Date(data.generated_at);
  runwayUpdated.textContent = Number.isFinite(generated.getTime())
    ? generated.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}) : '';
}
async function refreshRunway({force=false}={}){
  if (runwayLoading) return;
  runwayLoading = true;
  runwayRefresh.disabled = true;
  runwayRefresh.classList.add('loading');
  try {
    const response = await fetch(`/api/usage${force ? '?refresh=1' : ''}`, {cache:'no-store'});
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    renderRunway(await response.json());
    runwaySummary.className = 'runway-summary online';
    runwaySignal.textContent = 'Live';
  } catch(e) {
    runwaySummary.className = 'runway-summary offline';
    runwaySignal.textContent = 'Usage unavailable';
    if (!runwayProviders.querySelector('.runway-provider')) {
      runwayProviders.innerHTML = '<div class="runway-error">Could not reach the local usage service.</div>';
    }
  } finally {
    runwayLoading = false;
    runwayRefresh.disabled = false;
    runwayRefresh.classList.remove('loading');
  }
}

function runtimeDuration(seconds){
  let value = Math.max(0, Math.floor(Number(seconds) || 0));
  const hours = Math.floor(value / 3600); value %= 3600;
  const minutes = Math.floor(value / 60); const secs = value % 60;
  return `${hours}h ${String(minutes).padStart(2,'0')}m ${String(secs).padStart(2,'0')}s`;
}
function runtimeClock(base, active, generated){
  const at = new Date(generated).getTime();
  const extra = Number.isFinite(at) ? Math.max(0, Math.floor((Date.now() - at) / 1000)) : 0;
  return Number(base || 0) + Number(active || 0) * extra;
}
function runtimeValue(seconds, active, generated){
  return `<span data-runtime-base="${Number(seconds)||0}" data-runtime-active="${Number(active)||0}" data-runtime-at="${esc(generated)}">${esc(runtimeDuration(runtimeClock(seconds, active, generated)))}</span>`;
}
function runtimeModelLabel(model){
  return (model || 'default').split('/').pop();
}
function runtimeRow(item, kind, generated){
  const isAgent = kind === 'agent';
  const title = isAgent ? item.agent : runtimeModelLabel(item.model);
  const models = isAgent ? (item.models || []).map(runtimeModelLabel).join(', ') : (item.agents || []).join(', ');
  const route = isAgent ? (item.backends || []).join(', ') : item.backend;
  const live = item.active_runs ? ` · ${item.active_runs} active` : '';
  const role = isAgent && item.role ? ` · ${item.role}` : '';
  return `<div class="runtime-row">
    <div><div class="runtime-row-title" title="${esc(item.role||title)}">${esc(title)}</div>
      <div class="runtime-row-meta" title="${esc(models+role)}">${esc(route)} · ${esc(models||'default')} · ${item.runs} run${item.runs===1?'':'s'}${esc(live)}${esc(role)}</div></div>
    <div class="runtime-row-value">${runtimeValue(item.seconds, item.active_runs, generated)}</div>
  </div>`;
}
function tickRuntimeStats(){
  document.querySelectorAll('[data-runtime-base]').forEach(el => {
    el.textContent = runtimeDuration(runtimeClock(
      el.dataset.runtimeBase, el.dataset.runtimeActive, el.dataset.runtimeAt
    ));
  });
}
function renderRuntimeStats(data){
  const agents = Array.isArray(data.by_agent) ? data.by_agent : [];
  const models = Array.isArray(data.by_model) ? data.by_model : [];
  const ignored = Number(data.ignored_runs) || 0;
  runtimeStats.innerHTML = `<div class="runtime-hero">
      <div class="runtime-total">${runtimeValue(data.total_seconds, data.active_runs, data.generated_at)}</div>
      <div class="runtime-caption">Combined execution time. Concurrent workers count separately.</div>
    </div>
    <div class="runtime-facts">
      <div class="runtime-fact"><strong>${Number(data.timed_runs)||0}</strong><span>timed runs</span></div>
      <div class="runtime-fact"><strong>${Number(data.active_runs)||0}</strong><span>active now</span></div>
      <div class="runtime-fact"><strong>${agents.length}</strong><span>roster agents</span></div>
    </div>
    <div class="runtime-section"><h3>By roster agent</h3>${agents.map(x=>runtimeRow(x,'agent',data.generated_at)).join('') || '<div class="runtime-empty">No timed runs yet.</div>'}</div>
    <div class="runtime-section"><h3>By model</h3>${models.map(x=>runtimeRow(x,'model',data.generated_at)).join('') || '<div class="runtime-empty">No model history yet.</div>'}</div>
    ${ignored?`<div class="runtime-caption">${ignored} historical run${ignored===1?' was':'s were'} omitted because its timestamps were incomplete.</div>`:''}`;
  const generated = new Date(data.generated_at);
  runtimeUpdated.textContent = Number.isFinite(generated.getTime())
    ? generated.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}) : '';
  tickRuntimeStats();
}
async function refreshRuntimeStats(){
  if (runtimeLoading) return;
  runtimeLoading = true;
  runwayRefresh.disabled = true;
  runwayRefresh.classList.add('loading');
  try {
    const response = await api('api/stats', {cache:'no-store'});
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    renderRuntimeStats(await response.json());
  } catch(e) {
    if (!runtimeStats.querySelector('.runtime-row')) {
      runtimeStats.innerHTML = '<div class="runtime-empty">Runtime statistics are unavailable.</div>';
    }
  } finally {
    runtimeLoading = false;
    runwayRefresh.disabled = false;
    runwayRefresh.classList.remove('loading');
  }
}

// --- project selection (control-plane) -----------------------------------
// The browser only ever switches among entries returned by GET /api/projects.
// No typed path, no filesystem browser — the allowlist lives in the
// orchestra projects registry on disk and is the sole source of truth.
const PROJECT_KEY = 'orchestra.project';
let projectDir = null;     // {defaultProjectId, projects: [...]}
let activeProjectId = null;

function rememberedProject(){
  try { return localStorage.getItem(PROJECT_KEY) || null; } catch(e){ return null; }
}
function rememberProject(id){
  try {
    if (id) localStorage.setItem(PROJECT_KEY, id);
    else localStorage.removeItem(PROJECT_KEY);
  } catch(e){ /* private mode etc. — picker still works for this tab */ }
}
function projectHeader(){
  // Every fetch the page makes carries the active project id. The header
  // wins over any ?project= query, which exists for top-level navigations
  // and for clients that cannot easily set headers.
  return activeProjectId ? {'X-Orchestra-Project': activeProjectId} : {};
}
async function api(path, opts){
  opts = opts || {};
  const headers = Object.assign({}, projectHeader(), opts.headers || {});
  const res = await fetch(path, Object.assign({}, opts, {headers}));
  return res;
}

function renderProjectMenu(){
  if (!projectDir) return;
  const projs = projectDir.projects || [];
  // Active = the id we have in localStorage IF it is still in the live
  // allowlist; otherwise the launch default. Stale ids fall through to
  // the default silently here — the API will still 404 any explicit
  // request for an unknown id, but the picker itself never offers one.
  const remembered = rememberedProject();
  if (remembered && projs.some(p => p.id === remembered)){
    activeProjectId = remembered;
  } else {
    activeProjectId = projectDir.defaultProjectId || (projs[0] && projs[0].id) || null;
    rememberProject(activeProjectId);
  }
  const sel = document.getElementById('projSel');
  sel.hidden = !projs.length;
  if (!projs.length) return;
  const cur = projs.find(p => p.id === activeProjectId) || projs[0];
  document.getElementById('projLabel').textContent = cur.name || cur.root;
  document.getElementById('projDot').style.background =
    cur.id === projectDir.defaultProjectId ? 'var(--green)' : 'var(--blue)';
  const menu = document.getElementById('projMenu');
  menu.innerHTML = projs.map(p => {
    const sel = p.id === activeProjectId ? 'true' : 'false';
    const off = p.available === false ? ' offline' : '';
    const tag = p.id === projectDir.defaultProjectId ? ' <span class="muted">· default</span>' : '';
    return `<button class="proj-opt${off}" role="option" aria-selected="${sel}"
      onclick="pickProject('${esc(p.id)}')">
      <span class="po-name">${esc(p.name)}${tag}</span>
      <span class="po-root">${esc(p.root)}</span>
    </button>`;
  }).join('');
}
function toggleProjectMenu(open){
  const btn = document.getElementById('projBtn');
  const menu = document.getElementById('projMenu');
  const next = open == null ? menu.hidden : open;
  menu.hidden = !next;
  btn.setAttribute('aria-expanded', next ? 'true' : 'false');
}
document.addEventListener('click', e => {
  const sel = document.getElementById('projSel');
  if (!sel || sel.hidden) return;
  if (!sel.contains(e.target)) toggleProjectMenu(false);
});
async function pickProject(id){
  toggleProjectMenu(false);
  if (id === activeProjectId) return;
  rememberProject(id);
  activeProjectId = id;
  // Project switch invalidates every cached selection: the new project
  // has its own runs, teams, inboxes — drop them all and re-fetch.
  selected = null; selTm = null; tEtag = null; userPicked = false;
  lastHash = {};
  document.getElementById('pbody').innerHTML = '<span class="muted">loading…</span>';
  document.getElementById('phead').innerHTML = '<span class="muted">select a run</span>';
  renderProjectMenu();
  await refresh();
}

function elapsed(start, end){
  const b = end ? new Date(end) : new Date();
  let s = Math.max(0, Math.floor((b - new Date(start))/1000));
  const h = Math.floor(s/3600), m = Math.floor(s%3600/60); s = s%60;
  return h ? `${h}h${String(m).padStart(2,'0')}m` : m ? `${m}m${String(s).padStart(2,'0')}s` : `${s}s`;
}
function statusLabel(status){
  return status === 'killed' ? 'stopped by user' : status === 'waiting_input' ? 'waiting for answer' : status;
}
function statusChip(status){
  return `<span class="chip s-${esc(status)}">${esc(statusLabel(status))}</span>`;
}
function canStopRun(r){
  return r && !TERMINAL.has(r.status);
}
function tickElapsed(){
  document.querySelectorAll('[data-start]').forEach(el => {
    el.textContent = elapsed(el.dataset.start, el.dataset.end || null);
  });
  tickRuntimeStats();
}
setInterval(tickElapsed, 1000);

function setIfChanged(id, html){
  if (lastHash[id] === html) return false;
  lastHash[id] = html;
  const el = document.getElementById(id);
  const st = el.scrollTop;               // preserve scroll inside the box
  el.innerHTML = html;
  el.scrollTop = st;
  return true;
}

function renderRuns(){
  const byId = new Map(state.runs.map(r => [r.id, r]));
  const children = new Map();
  const owned = new Set();
  state.runs.forEach(r => {
    // A continuation belongs directly beneath its previous attempt. Native
    // child ownership is the fallback edge for runs that start a new session.
    const owner = r.parent_run && byId.has(r.parent_run) ? r.parent_run
      : r.lead_run && byId.has(r.lead_run) ? r.lead_run : null;
    if (owner === null || owner === r.id) return;
    const group = children.get(owner) || [];
    group.push(r);
    children.set(owner, group);
    owned.add(r.id);
  });
  const newestCache = new Map();
  function newestDescendantId(r, visiting=new Set()){
    if (newestCache.has(r.id)) return newestCache.get(r.id);
    if (visiting.has(r.id)) return r.id;
    const next = new Set(visiting); next.add(r.id);
    let newest = r.id;
    (children.get(r.id)||[]).forEach(child => {
      newest = Math.max(newest, newestDescendantId(child, next));
    });
    newestCache.set(r.id, newest);
    return newest;
  }
  const ordered = [];
  const seen = new Set();
  function add(r, depth=0){
    if (seen.has(r.id)) return;
    seen.add(r.id); ordered.push({r, depth});
    [...(children.get(r.id)||[])].sort((a,b)=>a.id-b.id).forEach(child=>add(child, depth+1));
  }
  state.runs.filter(r=>!owned.has(r.id))
    .sort((a,b)=>newestDescendantId(b)-newestDescendantId(a))
    .forEach(r=>add(r));
  // Corrupt or cyclic lineage should not make a run disappear from the UI.
  [...state.runs].reverse().forEach(r=>add(r));
  const html = ordered.map(({r, depth}) => `
    <div class="runitem ${r.parent_run?'continuation':r.lead_run?'child':''} ${!selTm&&r.id===selected?'sel':''}" style="padding-left:${14+Math.min(depth,5)*14}px" onclick="pick(${r.id})">
      <div class="top"><span class="mono">#${r.id}</span>${r.slug?`<span class="mono muted" title="memorable run name">${esc(r.slug)}</span>`:''}
        ${r.parent_run?`<span class="mono muted" title="continues run #${r.parent_run}">&#8618; #${r.parent_run}</span>`:''}
        ${r.lead_run?`<span class="mono muted" title="child of run #${r.lead_run}">↳ #${r.lead_run}</span>`:''}
        <b>${esc(r.agent)}</b>
        ${statusChip(r.status)}
        <span class="mono muted" style="margin-left:auto" data-start="${esc(r.started_at)}"
          ${r.finished_at?`data-end="${esc(r.finished_at)}"`:''}></span></div>
      <div class="title">${r.backend?`<span class="mono muted">${esc(r.backend)}</span> `:''}${r.model?`<span class="mono muted">${esc((r.model||'').split('/').pop())}</span> `:''}${r.work_item?`[${esc(r.work_item)}] `:''}${esc(r.title||'')}</div>
    </div>`).join('') || '<div class="runitem muted">no runs yet</div>';
  setIfChanged('runlist', html);
  tickElapsed();
}

function continuationLineage(r){
  const byId = new Map((state?.runs||[]).map(run=>[run.id, run]));
  const seen = new Set([r.id]);
  let current = r, root = r.id, depth = 0;
  while (current.parent_run){
    root = current.parent_run; depth += 1;
    if (seen.has(root) || !byId.has(root)) break;
    seen.add(root); current = byId.get(root);
  }
  return {root, depth};
}

function pick(id){ userPicked = true; select(id); }
function select(id){
  if (selected === id && !selTm) return;
  selected = id; selTm = null; tEtag = null; lastHash.pbody = null;
  document.getElementById('pbody').innerHTML = '<span class="muted">loading…</span>';
  renderRuns(); renderEnsemble(); refreshTranscript(true);
}
function pickTm(sid, team, label, model, status){
  userPicked = true;
  selTm = {sid, team, label, model, status}; selected = null; tEtag = null; lastHash.pbody = null;
  document.getElementById('pbody').innerHTML = '<span class="muted">loading…</span>';
  renderRuns(); renderEnsemble(); refreshTranscript(true);
}
function tmChip(m){
  const cls = m.status === 'busy' ? 's-running' : m.status === 'ready' ? 's-done' : 's-killed';
  return `<span class="chip ${cls}">${esc(m.status)}${m.execution_status?'/'+esc(m.execution_status):''}</span>`;
}
function renderEnsemble(){
  const card = document.getElementById('enscard');
  const teams = state.ensemble || [];
  card.style.display = teams.length ? '' : 'none';
  if (!teams.length) return;
  const html = teams.map(t => {
    const doneN = t.tasks.filter(x=>x.status==='completed').length;
    return `<div style="padding:8px 14px;border-bottom:1px solid var(--line)">
      <div><b>${esc(t.name)}</b> <span class="chip ${t.status==='active'?'s-running':'s-killed'}">${esc(t.status)}</span>
        <span class="muted mono">${doneN}/${t.tasks.length} tasks</span></div>
      ${t.members.map(m => `<div class="runitem ${selTm&&selTm.sid===m.session_id?'sel':''}" style="border:none;padding:4px 0 4px 8px"
        onclick="pickTm('${esc(m.session_id)}','${esc(t.id)}','${esc(m.name)}','${esc(m.model||'')}')">
        <div class="top"><b>${esc(m.name)}</b> ${tmChip(m)}
          <span class="mono muted" style="margin-left:auto">${esc((m.model||'').split('/').pop())}</span></div>
      </div>`).join('')}</div>`;
  }).join('');
  setIfChanged('ensteams', html);
}

async function stopRun(id){
  const r = state?.runs?.find(x => x.id === id);
  if (!canStopRun(r) || stopping.has(id)) return;
  if (!confirm(`Stop run #${id}?`)) return;
  stopping.add(id);
  lastHash.phead = null;
  renderRuns();
  try {
    const res = await api(`api/runs/${id}/stop`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:'{}',
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    await refresh();
    await refreshTranscript(true);
  } catch(e) {
    alert(`Could not stop run #${id}: ${e.message || e}`);
  } finally {
    stopping.delete(id);
    lastHash.phead = null;
    renderRuns();
    if (selected === id) refreshTranscript(true);
  }
}

function itemHtml(it, i){
  if (it.kind === 'text')    return `<div class="titem"><div class="prose">${esc(it.body)}</div></div>`;
  if (it.kind === 'delivery') {
    const mode = ['interrupt','checkin','queued'].includes(it.delivery) ? it.delivery : 'queued';
    const pending = it.phase === 'pending';
    const recalled = it.phase === 'recalled';
    const icon = recalled ? '&#8617;' : mode === 'interrupt' ? '&#128680;' : mode === 'checkin' ? '&#9200;' : '&#128236;';
    const label = recalled ? 'queued message recalled' : pending ? (mode === 'queued' ? 'queued for runner' : mode === 'checkin' ? 'check-in awaiting safe boundary' : 'interrupt awaiting safe boundary') : mode === 'interrupt' ? 'interrupt delivered to inbox' : mode === 'checkin' ? 'supervisor check-in delivered' : 'queued follow-up delivered';
    const messageRef = it.message_id ? ` · message #${esc(it.message_id)}` : '';
    const at = it.created_at ? ` · ${esc(it.created_at)}` : '';
    return `<div class="titem delivery ${mode} ${recalled?'recalled':pending?'pending':'delivered'}"><div><span class="event-title">${icon} ${label}</span><span class="event-route">${esc(it.sender||'orchestra')} → ${esc(it.recipient||'runner')}${messageRef}${at}</span></div>${it.body?`<div class="event-body">${esc(it.body)}</div>`:''}</div>`;
  }
  if (it.kind === 'question') {
    const waiting = it.status === 'waiting';
    const title = waiting ? '&#10067; worker question' : it.status === 'defaulted' ? '&#9203; auto-resumed with fallback' : '&#9989; question answered';
    const answer = !waiting && it.answer ? `<div class="question-answer"><span class="muted">answer${it.answered_by?` from ${esc(it.answered_by)}`:''}</span><br>${esc(it.answer)}</div>` : '';
    const action = waiting ? `<div class="question-action">Answer with <span class="mono">orchestra answer ${esc(selected)} "..."</span> · fallback at ${esc(it.deadline_at||'')}</div>` : '';
    return `<div class="titem question ${waiting?'waiting':'resolved'}"><div><span class="question-title">${title}</span><span class="event-route">${esc(it.sender||'runner')} → ${esc(it.recipient||'orchestrator')}</span></div><div class="question-body">${esc(it.question||'')}</div><div class="question-default"><span class="muted">recommended fallback</span><br>${esc(it.recommended_default||'')}</div>${answer}${action}</div>`;
  }
  if (it.kind === 'prompt')  return `<details class="prompt" data-k="${i}"><summary>&#128221; initial runner prompt <span class="muted">· ${it.body.length} chars</span></summary><div class="inner"><pre>${esc(it.body)}</pre></div></details>`;
  if (it.kind === 'thinking')return `<details class="think" data-k="${i}"><summary>&#129504; thinking <span class="muted">· ${it.body.length} chars</span></summary><div class="inner"><pre>${esc(it.body)}</pre></div></details>`;
  if (it.kind === 'tool')    return `<details class="tool" data-k="${i}"><summary>&#128295; ${esc(it.name)} <span class="muted">· ${esc(it.status||'')}</span></summary><div class="inner">${it.input?`<div class="lbl">input</div><pre>${esc(it.input)}</pre>`:''}${it.output?`<div class="lbl">output</div><pre>${esc(it.output)}</pre>`:''}</div></details>`;
  if (it.kind === 'error')   return `<div class="titem error">${esc(it.body)}</div>`;
  if (it.kind === 'details') return `<details data-k="${i}" open><summary>&#9881; configuration <span class="muted">· backend · model</span></summary><div class="inner"><table class="kv"><tr><th>backend</th><td>${esc(it.backend||'')}</td></tr><tr><th>model</th><td>${esc(it.model||'')}</td></tr>${it.team?`<tr><th>team</th><td>${esc(it.team)}</td></tr>`:''}${it.requested_by?`<tr><th>requested by</th><td>${esc(it.requested_by)}</td></tr>`:''}${it.lead_run?`<tr><th>lead run</th><td>#${esc(it.lead_run)}</td></tr>`:''}${it.parent_run?`<tr><th>continues</th><td><button class="lineage-link" onclick="select(${Number(it.parent_run)})">run #${esc(it.parent_run)}</button></td></tr><tr><th>conversation</th><td>#${esc(it.continuation_root)} · attempt ${esc(it.continuation_depth+1)}</td></tr>`:''}${it.session_ref?`<tr><th>session</th><td><span class="mono">${esc(it.session_ref.slice(0,18))}…</span></td></tr>`:''}</table></div></details>`;
  return `<div class="titem meta">${esc(it.body)}</div>`;
}

function renderDetails(r){
  // Pure-data block injected as the first "details" item in the transcript
  // pane, without removing existing items below. Credentials are NEVER
  // carried on the run row — only the configured backend + model name.
  const lineage = continuationLineage(r);
  return {
    kind:'details',
    backend:r.backend||'',
    model:r.model||'',
    team:r.team||'',
    requested_by:r.requested_by||'',
    lead_run:r.lead_run||null,
    parent_run:r.parent_run||null,
    continuation_root:lineage.root,
    continuation_depth:lineage.depth,
    session_ref:r.session_ref||'',
  };
}

async function refreshTranscript(force){
  if (selTm) return refreshTmTranscript(force);
  if (selected == null) return;
  let res;
  try { res = await (await api(`api/transcript/${selected}${tEtag&&!force?`?etag=${tEtag}`:''}`)).json(); }
  catch(e){ return; }
  if (res.unchanged) return;
  tEtag = res.etag;
  const r = res.run;
  const lineage = continuationLineage(r);
  const head = `<span class="mono">#${r.id}</span> ${r.slug?`<span class="mono muted" title="memorable run name">${esc(r.slug)}</span>`:''}
    <b>${esc(r.agent)}</b>
    ${statusChip(r.status)}
    <span class="mono muted" title="configured backend">${esc(r.backend||'')}</span>
    ${r.model?`<span class="mono muted" title="configured model">${esc(r.model)}</span>`:''}
    ${r.work_item?`<span class="mono">${esc(r.work_item)}</span>`:''}
    ${r.branch?`<span class="mono muted">${esc(r.branch)}</span>`:''}
    ${r.parent_run?`<button class="lineage-link" type="button" onclick="select(${Number(r.parent_run)})">continues #${esc(r.parent_run)}</button><span class="mono muted">conversation #${esc(lineage.root)} · attempt ${esc(lineage.depth+1)}</span>`:''}
    <span class="mono muted" data-start="${esc(r.started_at)}" ${r.finished_at?`data-end="${esc(r.finished_at)}"`:''}></span>
    ${canStopRun(r)?`<button class="danger" type="button" onclick="stopRun(${r.id})" ${stopping.has(r.id)?'disabled':''}>${stopping.has(r.id)?'stopping...':'Stop'}</button>`:''}
    <label id="follow"><input type="checkbox" id="followcb" checked> follow tail</label>`;
  setIfChanged('phead', head);
  const body = document.getElementById('pbody');
  const open = new Set([...body.querySelectorAll('details[open]')].map(d=>d.dataset.k));
  const follow = document.getElementById('followcb')?.checked ?? true;
  const nearBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 60;
  body.innerHTML = [renderDetails(r), ...res.items].map(itemHtml).join('')
    || '<span class="muted">no output yet…</span>';
  body.querySelectorAll('details').forEach(d => { if (open.has(d.dataset.k)) d.open = true; });
  if (follow && (nearBottom || force)) body.scrollTop = body.scrollHeight;
  tickElapsed();
}

async function refreshTmTranscript(force){
  const tm = selTm;
  let res;
  try { res = await (await api(`api/teammate/${tm.sid}?team=${encodeURIComponent(tm.team)}${tEtag&&!force?`&etag=${tEtag}`:''}`)).json(); }
  catch(e){ return; }
  if (res.unchanged || selTm !== tm) return;
  tEtag = res.etag;
  const team = (state.ensemble||[]).find(t=>t.id===tm.team);
  const mem = team?.members.find(m=>m.session_id===tm.sid);
  setIfChanged('phead', `<b>${esc(tm.label)}</b> ${mem?tmChip(mem):''}
    <span class="mono muted">${esc(tm.model)}</span>
    <span class="muted">ensemble teammate · ${esc(team?.name||'')}</span>
    <label id="follow"><input type="checkbox" id="followcb" checked> follow tail</label>`);
  const body = document.getElementById('pbody');
  const open = new Set([...body.querySelectorAll('details[open]')].map(d=>d.dataset.k));
  const follow = document.getElementById('followcb')?.checked ?? true;
  const nearBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 60;
  let html = '';
  if (team?.tasks.length) html += `<details data-k="board"><summary>&#128203; team board
    <span class="muted">· ${team.tasks.filter(x=>x.status==='completed').length}/${team.tasks.length} done</span></summary>
    <div class="inner">${team.tasks.map(x=>`<div>[${esc(x.status)}] ${esc(x.content)}
      ${x.assignee?`<span class="muted">→ ${esc(x.assignee)}</span>`:''}</div>`).join('')}</div></details>`;
  if (res.messages?.length) html += `<details data-k="msgs"><summary>&#128172; team messages
    <span class="muted">· ${res.messages.length}</span></summary>
    <div class="inner">${res.messages.map(m=>`<div class="msg"><div class="meta">${esc(m.from_name)} → ${esc(m.to_name)}</div>
      <div class="body">${esc(m.content)}</div></div>`).join('')}</div></details>`;
  html += res.items.map(itemHtml).join('') || '<span class="muted">no output yet…</span>';
  body.innerHTML = html;
  body.querySelectorAll('details').forEach(d => { if (open.has(d.dataset.k)) d.open = true; });
  if (follow && (nearBottom || force)) body.scrollTop = body.scrollHeight;
}

function renderBottom(){
  const byRcpt = {};
  for (const m of state.messages) (byRcpt[m.recipient] ??= []).push(m);
  const inbox = Object.entries(byRcpt).map(([r, ms]) => {
    const unread = ms.filter(m=>!m.read_at).length;
    return `<details ${unread?'open':''}><summary><b>${esc(r)}</b>
      <span class="muted">${ms.length} msgs${unread?`, <b>${unread} unread</b>`:''}</span></summary>
      <div class="inner">${ms.slice(-12).map(m=>`<div class="msg ${m.read_at?'':'unread'}">
        <div class="meta">${esc(m.sender)} → ${esc(m.recipient)} · ${esc(m.created_at)}
          ${m.run_id?` · <a href="#" onclick="pick(${m.run_id});return false">run ${m.run_id}</a>`:''}
          ${m.work_item?` · ${esc(m.work_item)}`:''}</div>
        <div class="body">${esc(m.body)}</div></div>`).join('')}</div></details>`;
  }).join('') || '<span class="muted">no messages yet</span>';
  setIfChanged('inboxes', inbox);
  setIfChanged('feed', state.feed.map(f =>
    `<div class="feeditem"><span class="muted mono">${esc(f.created_at.slice(11,19))}</span>
     <b>${esc(f.author)}</b>: ${esc(f.body)}
     ${f.tags?`<span class="muted">[${esc(f.tags)}]</span>`:''}</div>`).join('')
    || '<span class="muted">feed empty</span>');
  setIfChanged('teams', state.teams.map(t =>
    `<div><b>${esc(t.name)}</b>: ${esc(t.members.join(', ')||'(empty)')}</div>`).join('')
    || '<span class="muted">no teams</span>');
}

async function refreshProjects(){
  try {
    const res = await fetch('api/projects');
    if (!res.ok) return;
    const dir = await res.json();
    const prev = projectDir && projectDir.projects ? projectDir.projects.length : 0;
    projectDir = dir;
    renderProjectMenu();
    // If the picker just appeared for the first time, force a state
    // refresh so /api/state runs with the now-active project header.
    if (prev === 0 && dir.projects.length > 0) void refresh();
  } catch(e){ /* picker is best-effort */ }
}

async function refresh(){
  try { state = await (await api('api/state')).json(); }
  catch(e){ document.getElementById('beat').style.background='var(--red)'; return; }
  document.getElementById('beat').style.background='var(--green)';
  document.getElementById('root').textContent = state.root;
  if (selected == null && !selTm && !userPicked && state.runs.length){
    const active = state.runs.filter(r=>canStopRun(r));
    select((active.length ? active[active.length-1] : state.runs[state.runs.length-1]).id);
  }
  renderRuns(); renderEnsemble(); renderBottom();
  if (runwayDock.classList.contains('open') && insightsView === 'runtime') refreshRuntimeStats();
}
document.getElementById('projBtn').addEventListener('click', e => {
  e.stopPropagation();
  toggleProjectMenu();
});
runwayToggle.addEventListener('click', () => runwaySetOpen(
  !(runwayDock.classList.contains('open') && insightsView === 'usage'), {view:'usage'}
));
runtimeToggle.addEventListener('click', () => runwaySetOpen(
  !(runwayDock.classList.contains('open') && insightsView === 'runtime'), {view:'runtime'}
));
runwayClose.addEventListener('click', () => runwaySetOpen(false));
runwayBackdrop.addEventListener('click', () => runwaySetOpen(false));
runwayRefresh.addEventListener('click', () => insightsView === 'runtime'
  ? refreshRuntimeStats() : refreshRunway({force:true}));
document.addEventListener('keydown', event => {
  if (event.key === 'Escape' && runwayDock.classList.contains('open')) runwaySetOpen(false);
});
const insightParams = new URLSearchParams(location.search);
let initialInsightsView = insightParams.get('stats') === 'open' ? 'runtime' : 'usage';
try { initialInsightsView = localStorage.getItem(INSIGHTS_VIEW_KEY) || initialInsightsView; } catch(e){}
insightsSetView(initialInsightsView, {remember:false});
let runwayInitiallyOpen = insightParams.get('runway') === 'open' || insightParams.get('stats') === 'open';
try { runwayInitiallyOpen ||= localStorage.getItem(RUNWAY_OPEN_KEY) === '1'; } catch(e){}
runwaySetOpen(runwayInitiallyOpen, {remember:false});
refreshRunway(); setInterval(refreshRunway, 90000);
refreshProjects(); setInterval(refreshProjects, 8000);
refresh(); setInterval(refresh, 2500); setInterval(()=>refreshTranscript(false), 2000);
</script></body></html>
